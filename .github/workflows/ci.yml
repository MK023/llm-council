# CI workflow — defensive: no use of untrusted event payloads in run: commands.
# Only safe inputs: matrix.python-version (controlled by this file) and static strings.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Verify no external runtime dependencies (stdlib-only)
        run: |
          test ! -f requirements.txt || (echo "requirements.txt found — project should remain stdlib-only" && exit 1)

      - name: Run unit tests
        run: python -m unittest discover tests/ -v

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff==0.15.9

      - name: Ruff check
        run: ruff check council/ tests/

      - name: Ruff format check
        run: ruff format --check council/ tests/
